name: E2E MCP Gateway

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      allow_live_writes:
        description: 'Enable write operations (creates/deletes test profiles)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
  push:
    branches: 
      - main
    tags:
      - 'v*.*.*'  # Also run on version tags
  pull_request:
    branches: [ main ]  # Run on all PRs to main

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [slim, alpine]
    env:
      ALLOW_LIVE_WRITES: ${{ github.event.inputs.allow_live_writes || 'true' }}
      NEXTDNS_READABLE_PROFILES: 'ALL'
      NEXTDNS_WRITABLE_PROFILES: 'ALL'
      CI: 'true'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Create Docker CLI plugin directory
        run: |
          mkdir -p $HOME/.docker/cli-plugins

      - name: Install Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14' 

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          activate-environment: "true"

      - name: Build docker-mcp plugin from source
        run: |
          # Clone the MCP Gateway repo at latest HEAD
          git clone --depth 1 https://github.com/docker/mcp-gateway.git /tmp/mcp-gateway
          cd /tmp/mcp-gateway
          
          # Build the plugin
          make docker-mcp
          
          # Install to CLI plugins directory
          mkdir -p $HOME/.docker/cli-plugins
          cp ./dist/docker-mcp $HOME/.docker/cli-plugins/docker-mcp
          chmod +x $HOME/.docker/cli-plugins/docker-mcp

      - name: Verify docker-mcp installation
        run: |
          docker mcp --help
          docker mcp version

      - name: Verify Docker daemon
        run: |
          docker info
          docker ps

      - name: Build NextDNS MCP Docker image (${{ matrix.variant }})
        run: |
          if [ "${{ matrix.variant }}" = "alpine" ]; then
            docker build -f Dockerfile.alpine -t nextdns-mcp:alpine .
          else
            docker build -f Dockerfile -t nextdns-mcp:slim .
          fi

      - name: Create .env file for script
        env:
          NEXTDNS_API_KEY: ${{ secrets.NEXTDNS_API_KEY }}
        run: |
          cat > .env <<EOF
          NEXTDNS_API_KEY=${NEXTDNS_API_KEY}
          ALLOW_LIVE_WRITES=${ALLOW_LIVE_WRITES}
          NEXTDNS_READABLE_PROFILES=${NEXTDNS_READABLE_PROFILES}
          NEXTDNS_WRITABLE_PROFILES=${NEXTDNS_WRITABLE_PROFILES}
          EOF
          
          # Create secrets file for docker-mcp (file-based secrets instead of Desktop API)
          mkdir -p ~/.docker/mcp
          echo "nextdns.api_key=${NEXTDNS_API_KEY}" > ~/.docker/mcp/secrets.env
          echo "Secrets file created with nextdns.api_key"

      - name: Run E2E validation script (${{ matrix.variant }})
        run: |
          chmod +x scripts/gateway_e2e_run.sh
          scripts/gateway_e2e_run.sh .env ${{ matrix.variant }}

      - name: Upload test report (${{ matrix.variant }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-report-${{ matrix.variant }}
          path: artifacts/tools_report_${{ matrix.variant }}.jsonl
          if-no-files-found: warn

      - name: Display test summary (${{ matrix.variant }})
        if: always()
        env:
          REPORT_FILE: artifacts/tools_report_${{ matrix.variant }}.jsonl
        run: |
          echo "## E2E Test Results — ${{ matrix.variant }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "$REPORT_FILE" ]; then
            TOTAL=$(wc -l < "$REPORT_FILE")
            PASSED=$(grep -c '"status":"OK"' "$REPORT_FILE" || echo "0")
            FAILED=$(grep -c '"status":"FAILED"' "$REPORT_FILE" || echo "0")
            SKIPPED=$(grep -c '"status":"SKIPPED"' "$REPORT_FILE" || echo "0")
            SCHEMA_VALID=$(grep -c '"schema_validation":"VALID"' "$REPORT_FILE" || echo "0")
            SCHEMA_INVALID=$(grep -c '"schema_validation":"INVALID"' "$REPORT_FILE" || echo "0")
            SCHEMA_SKIPPED=$(grep -c '"schema_validation":"SKIPPED"' "$REPORT_FILE" || echo "0")
            
            echo "- **Total Tools**: $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- **Passed**: ✅ $PASSED" >> $GITHUB_STEP_SUMMARY
            echo "- **Failed**: ❌ $FAILED" >> $GITHUB_STEP_SUMMARY
            echo "- **Skipped**: ⏭️ $SKIPPED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Schema Validation" >> $GITHUB_STEP_SUMMARY
            echo "- **Valid**: ✅ $SCHEMA_VALID" >> $GITHUB_STEP_SUMMARY
            echo "- **Invalid**: ❌ $SCHEMA_INVALID" >> $GITHUB_STEP_SUMMARY
            echo "- **Skipped**: ⏭️ $SCHEMA_SKIPPED" >> $GITHUB_STEP_SUMMARY
            
            if [ $FAILED -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Failed Tools" >> $GITHUB_STEP_SUMMARY
              grep '"status":"FAILED"' "$REPORT_FILE" | jq -r '"\(.tool): \(.error // "Unknown error")"' >> $GITHUB_STEP_SUMMARY || echo "Could not parse failures" >> $GITHUB_STEP_SUMMARY
            fi
            
            if [ $SCHEMA_INVALID -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Schema Validation Failures" >> $GITHUB_STEP_SUMMARY
              grep '"schema_validation":"INVALID"' "$REPORT_FILE" | jq -r '"\(.tool): \(.schema_error)"' >> $GITHUB_STEP_SUMMARY || echo "Could not parse schema errors" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ No test report generated ($REPORT_FILE)" >> $GITHUB_STEP_SUMMARY
          fi
