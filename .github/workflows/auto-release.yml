name: Auto Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    if: |
      github.event.pull_request.merged == true &&
      (
        contains(github.event.pull_request.labels.*.name, 'bump-patch') ||
        contains(github.event.pull_request.labels.*.name, 'bump-minor') ||
        contains(github.event.pull_request.labels.*.name, 'bump-major')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Project Version
        id: version
        run: |
          VERSION=$(grep "^version =" pyproject.toml | cut -d'"' -f2)
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$VERSION"

      - name: Generate Release Notes and Create Release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tagName = '${{ steps.version.outputs.tag }}';
            console.log(`Creating release for ${tagName}...`);
            
            try {
              // 1. Generate the release notes
              const { data: notes } = await github.rest.repos.generateReleaseNotes({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                target_commitish: 'main'
              });
              
              // 2. Create the GitHub release
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tagName,
                name: tagName,
                body: notes.body,
                draft: false,
                prerelease: false,
                generate_release_notes: false // We already generated them manually
              });
              
              console.log(`✅ Successfully created release ${tagName}`);
            } catch (error) {
              console.error(`❌ Failed to create release: ${error.message}`);
              core.setFailed(error.message);
            }
