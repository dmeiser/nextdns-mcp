name: Version Guard

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read

jobs:
  check-labels:
    name: Verify Release Labels
    runs-on: ubuntu-latest
    steps:
      - name: Validate Labels
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          echo "Current labels: $LABELS"
          
          HAS_RELEASE_LABEL=false
          if echo "$LABELS" | grep -qE "bump-patch|bump-minor|bump-major|no-release"; then
            HAS_RELEASE_LABEL=true
          fi
          
          if [ "$HAS_RELEASE_LABEL" = "false" ]; then
            echo "❌ Error: No release label found!"
            echo "Please add one of the following labels to this PR:"
            echo "- bump-patch"
            echo "- bump-minor"
            echo "- bump-major"
            echo "- no-release"
            exit 1
          fi
          
          echo "✅ Valid release label found."

  check-sync:
    name: Verify Version Sync
    runs-on: ubuntu-latest
    needs: check-labels
    steps:
      - name: Check for no-release label
        id: bypass
        run: |
          HAS_LABEL="${{ contains(github.event.pull_request.labels.*.name, 'no-release') }}"
          echo "has_label=$HAS_LABEL" >> $GITHUB_OUTPUT
          if [ "$HAS_LABEL" = "true" ]; then
            echo "✅ 'no-release' label found. Skipping version sync check."
          fi

      - name: Checkout main (baseline)
        if: steps.bypass.outputs.has_label != 'true'
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout PR branch
        if: steps.bypass.outputs.has_label != 'true'
        uses: actions/checkout@v4
        with:
          path: pr

      - name: Validate Versions
        if: steps.bypass.outputs.has_label != 'true'
        run: |
          echo "### 🔍 Extracting Versions..."
          
          PR_PYPROJECT=$(grep "^version =" pr/pyproject.toml | cut -d'"' -f2)
          PR_INIT=$(grep "__version__ =" pr/src/nextdns_mcp/__init__.py | cut -d'"' -f2)
          PR_DOCKER=$(grep "LABEL org.opencontainers.image.version=" pr/Dockerfile | cut -d'"' -f2)
          MAIN_VERSION=$(grep "^version =" main/pyproject.toml | cut -d'"' -f2)

          echo "Main Version: $MAIN_VERSION"
          echo "PR pyproject.toml: $PR_PYPROJECT"
          echo "PR __init__.py: $PR_INIT"
          echo "PR Dockerfile: $PR_DOCKER"

          FAILED=0

          # 1. Check if version was incremented
          if [ "$PR_PYPROJECT" == "$MAIN_VERSION" ]; then
            echo "❌ Error: Version in pyproject.toml has not been incremented from $MAIN_VERSION."
            FAILED=1
          fi

          # 2. Check for internal consistency
          if [ "$PR_PYPROJECT" != "$PR_INIT" ] || [ "$PR_PYPROJECT" != "$PR_DOCKER" ]; then
            echo "❌ Error: Version mismatch between files!"
            FAILED=1
          fi

          if [ $FAILED -eq 1 ]; then
            echo ""
            echo "🚨 Version check failed! Use a 'bump-*' label to auto-fix (coming soon) or update manually."
            exit 1
          fi

          echo ""
          echo "✅ All version strings are synced and incremented ($PR_PYPROJECT)."
